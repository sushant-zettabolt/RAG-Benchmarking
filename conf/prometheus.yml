global:
  scrape_interval: 5s

scrape_configs:
  - job_name: litellm
    # trailing slash matters: /metrics returns a 307 redirect
    metrics_path: /metrics/
    authorization:
      credentials: sk-bench-master
    static_configs:
      - targets: ['litellm:4000']

  - job_name: llamacpp_chat
    static_configs:
      - targets: ['llama-chat:8080']

  - job_name: llamacpp_embed
    static_configs:
      - targets: ['llama-embed:8080']

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
