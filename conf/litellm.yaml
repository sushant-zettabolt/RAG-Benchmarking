model_list:
  - model_name: chat-model
    litellm_params:
      model: openai/chat-model
      api_base: http://llama-chat:8080/v1
      api_key: "sk-noauth"
      # Disable llama.cpp prompt caching so every request reprocesses the FULL
      # prompt. Without this, the prompt_tokens we measure (llamacpp counter =
      # tokens *processed*, i.e. full prompt minus cached prefix) diverges between
      # the baseline/zendnn A/B jobs because cache reuse differs run-to-run. Forcing
      # full prefill makes prompt_tokens == true prompt length → identical per query
      # across backends, and makes prefill work directly comparable. Sent via
      # extra_body so litellm's drop_params doesn't strip this non-OpenAI field.
      extra_body:
        cache_prompt: false
  # Fixed-decode variant of chat-model for ZenDNN A/B perf runs. `ignore_eos`
  # stops the model from ever ending early and `n_predict` caps generation, so
  # EVERY request emits exactly n_predict decode tokens on BOTH backends —
  # combined with cache_prompt:false (identical prefill) and per-query sessions
  # (identical prompt), prefill+decode work is identical and latency is directly
  # comparable. n_predict is an INTEGER (a string value hangs llama.cpp);
  # run_ab.sh rewrites it from AB_FIXED_DECODE. Only used when AnythingLLM is
  # pointed here (GENERIC_OPEN_AI_MODEL_PREF=chat-model-bench).
  - model_name: chat-model-bench
    litellm_params:
      model: openai/chat-model
      api_base: http://llama-chat:8080/v1
      api_key: "sk-noauth"
      extra_body:
        cache_prompt: false
        ignore_eos: true
        n_predict: 128
  # Dedicated judge route — no cache_prompt:false so llama.cpp can cache the
  # constant system prompt across consecutive judge calls, making grading ~3x
  # faster. Safe to cache here because judge calls happen AFTER the per-query
  # metrics snapshot and never pollute the measured prefill counters.
  - model_name: judge-model
    litellm_params:
      model: openai/chat-model
      api_base: http://llama-chat:8080/v1
      api_key: "sk-noauth"

  - model_name: embed-model
    litellm_params:
      model: openai/embed-model
      api_base: http://llama-embed:8080/v1
      api_key: "sk-noauth"
    # REQUIRED: without mode: embedding LiteLLM health-probes this endpoint with a
    # chat completion, flags it unhealthy, and AnythingLLM then silently returns
    # empty answers (textResponse=None).
    model_info:
      mode: embedding

litellm_settings:
  callbacks: ["prometheus"]
  drop_params: true
  require_auth_for_metrics_endpoint: false

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
