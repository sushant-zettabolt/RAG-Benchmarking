# Local RAG Evaluation Stack ‚Äî fully containerized.
#   docker compose up -d     brings up the 5 serving containers
#   the `harness` profile holds the ingest/evaluate/report toolbox (run on demand)
name: ${COMPOSE_PROJECT_NAME:-nq-rag-eval}

services:
  # ‚îÄ‚îÄ LLM inference (chat) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # Models are NOT downloaded ‚Äî supply your own GGUF via MODELS_DIR (mounted at
  # /models) and point CHAT_MODEL_PATH at it.
  llama-chat:
    # Built from public source on first `up` (clones latest llama.cpp; ZenDNN OFF
    # for the baseline image). The same cached image serves chat OR embed ‚Äî only
    # the mounted model + command flags differ. run_ab.sh overrides CHAT_IMAGE to
    # swap in nqrag-llama:zendnn per job. See docker/llama/Dockerfile.
    build:
      context: ./docker/llama
      args:
        GGML_ZENDNN: "OFF"
        LLAMA_CPP_REPO: ${LLAMA_CPP_REPO:-https://github.com/ggml-org/llama.cpp}
        LLAMA_CPP_REF: ${LLAMA_CPP_REF:-}
    image: ${CHAT_IMAGE:-nqrag-llama:baseline}
    container_name: nqrag-llama-chat
    # CPU pinning (empty = no pin). On a multi-socket box pin to ONE NUMA node's
    # cores and set CHAT_MEMBIND to that node so memory is local too.
    cpuset: ${CHAT_CPUSET:-}
    # SYS_NICE lets numactl set the memory policy (set_mempolicy/mbind) ‚Äî without
    # it the default seccomp profile blocks --membind with "Operation not permitted".
    cap_add:
      - SYS_NICE
    environment:
      CHAT_MODEL_PATH: ${CHAT_MODEL_PATH:-}
      CHAT_CTX: ${CHAT_CTX:-8192}
      CHAT_BATCH: ${CHAT_BATCH:-512}
      CHAT_UBATCH: ${CHAT_UBATCH:-512}
      CHAT_PARALLEL: ${CHAT_PARALLEL:-1}
      CHAT_NGL: ${CHAT_NGL:-0}
      CHAT_THREADS: ${CHAT_THREADS:-}
      CHAT_MEMBIND: ${CHAT_MEMBIND:-}
      # CPUs numactl pins to (in-process); reuses the same cores as `cpuset` above.
      CHAT_PHYSCPUBIND: ${CHAT_CPUSET:-}
      CHAT_EXTRA_FLAGS: ${CHAT_EXTRA_FLAGS:-}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        if [ -z "$$CHAT_MODEL_PATH" ]; then echo "ERROR: CHAT_MODEL_PATH is not set. Put your chat GGUF under MODELS_DIR and set CHAT_MODEL_PATH to its path under /models (e.g. /models/model.gguf)." >&2; exit 1; fi
        if [ ! -f "$$CHAT_MODEL_PATH" ]; then echo "ERROR: chat model not found at $$CHAT_MODEL_PATH. Check MODELS_DIR mount and CHAT_MODEL_PATH." >&2; exit 1; fi
        # OpenMP thread affinity: bind threads close and place one per physical core
        # so all threads stay on the pinned NUMA node (cpuset). Matches the A/B overlay.
        export OMP_PROC_BIND=close
        export OMP_PLACES=cores
        ARGS="--host 0.0.0.0 --port 8080 --ctx-size $$CHAT_CTX --n-gpu-layers $$CHAT_NGL --parallel $$CHAT_PARALLEL --no-mmap -fa on --metrics --alias chat-model --model $$CHAT_MODEL_PATH"
        if [ -n "$$CHAT_THREADS" ]; then ARGS="$$ARGS --threads $$CHAT_THREADS"; fi
        ARGS="$$ARGS $$CHAT_EXTRA_FLAGS"
        NA=""
        if [ -n "$$CHAT_PHYSCPUBIND" ]; then NA="$$NA --physcpubind=$$CHAT_PHYSCPUBIND"; fi
        if [ -n "$$CHAT_MEMBIND" ]; then NA="$$NA --membind=$$CHAT_MEMBIND"; fi
        NUMA=""
        if [ -n "$$NA" ]; then
          NUMA="numactl$$NA"   # numactl is baked into the image
          echo "[llama-chat] NUMA bind:$$NA"
        fi
        echo "[llama-chat] $$NUMA /app/llama-server $$ARGS"
        exec $$NUMA /app/llama-server $$ARGS
    volumes:
      - ${MODELS_DIR:-./models}:/models:ro
    ports:
      - "${CHAT_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 30s
    restart: unless-stopped

  # ‚îÄ‚îÄ Embedding server ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  llama-embed:
    # Reuses the image llama-chat builds (no second compile). Defaults to the
    # baseline image; run_ab.sh overrides EMBED_IMAGE to nqrag-llama:zendnn so the
    # A/B swaps the embed backend in lockstep with chat.
    image: ${EMBED_IMAGE:-nqrag-llama:baseline}
    container_name: nqrag-llama-embed
    cpuset: ${EMBED_CPUSET:-}
    cap_add:
      - SYS_NICE
    environment:
      EMBED_MODEL_PATH: ${EMBED_MODEL_PATH:-}
      EMBED_CTX: ${EMBED_CTX:-2048}
      EMBED_BATCH: ${EMBED_BATCH:-2048}
      EMBED_UBATCH: ${EMBED_UBATCH:-2048}
      EMBED_NGL: ${EMBED_NGL:-0}
      EMBED_THREADS: ${EMBED_THREADS:-}
      EMBED_MEMBIND: ${EMBED_MEMBIND:-}
      EMBED_PHYSCPUBIND: ${EMBED_CPUSET:-}
      EMBED_EXTRA_FLAGS: ${EMBED_EXTRA_FLAGS:-}
      # Server slots. Empty/1 = single slot (retrieve: one query at a time). >1 is
      # used only for the one-time bulk ingest (run_ingest.sh) to embed many chunks
      # concurrently; ctx-size is scaled by the slot count (each slot keeps EMBED_CTX).
      EMBED_PARALLEL: ${EMBED_PARALLEL:-}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        if [ -z "$$EMBED_MODEL_PATH" ]; then echo "ERROR: EMBED_MODEL_PATH is not set. Put your embedding GGUF under MODELS_DIR and set EMBED_MODEL_PATH to its path under /models (e.g. /models/embed.gguf)." >&2; exit 1; fi
        if [ ! -f "$$EMBED_MODEL_PATH" ]; then echo "ERROR: embedding model not found at $$EMBED_MODEL_PATH. Check MODELS_DIR mount and EMBED_MODEL_PATH." >&2; exit 1; fi
        # OpenMP thread affinity ‚Äî same as llama-chat. The A/B swaps the embed
        # backend too, so both backends get OMP_PROC_BIND=close + OMP_PLACES=cores
        # in all cases (the only ZenDNN knob added in the zendnn job is the env
        # var ZENDNNL_MATMUL_ALGO, set by the A/B overlay).
        export OMP_PROC_BIND=close
        export OMP_PLACES=cores
        # Slots: empty/1 = single slot (retrieve). >1 (bulk ingest) needs ctx scaled
        # by slot count so each slot still gets a full EMBED_CTX window.
        CTX=$$EMBED_CTX
        PAR=""
        if [ -n "$$EMBED_PARALLEL" ] && [ "$$EMBED_PARALLEL" -gt 1 ] 2>/dev/null; then
          CTX=$$((EMBED_CTX * EMBED_PARALLEL))
          PAR="--parallel $$EMBED_PARALLEL"
          echo "[llama-embed] ingest mode: $$EMBED_PARALLEL slots, ctx-size=$$CTX"
        fi
        ARGS="--host 0.0.0.0 --port 8080 --embedding --ctx-size $$CTX --batch-size $$EMBED_BATCH --ubatch-size $$EMBED_UBATCH --n-gpu-layers $$EMBED_NGL --metrics --alias embed-model --model $$EMBED_MODEL_PATH $$PAR"
        if [ -n "$$EMBED_THREADS" ]; then ARGS="$$ARGS --threads $$EMBED_THREADS"; fi
        ARGS="$$ARGS $$EMBED_EXTRA_FLAGS"
        NA=""
        if [ -n "$$EMBED_PHYSCPUBIND" ]; then NA="$$NA --physcpubind=$$EMBED_PHYSCPUBIND"; fi
        if [ -n "$$EMBED_MEMBIND" ]; then NA="$$NA --membind=$$EMBED_MEMBIND"; fi
        NUMA=""
        if [ -n "$$NA" ]; then
          NUMA="numactl$$NA"   # numactl is baked into the image
          echo "[llama-embed] NUMA bind:$$NA"
        fi
        echo "[llama-embed] $$NUMA /app/llama-server $$ARGS"
        exec $$NUMA /app/llama-server $$ARGS
    volumes:
      - ${MODELS_DIR:-./models}:/models:ro
    ports:
      - "${EMBED_PORT:-8082}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 30s
    restart: unless-stopped

  # ‚îÄ‚îÄ LiteLLM proxy (unifies endpoints; exposes token-usage + TTFT metrics) ‚îÄ‚îÄ‚îÄ‚îÄ
  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-stable}
    container_name: nqrag-litellm
    cpuset: ${LITELLM_CPUSET:-}
    depends_on:
      llama-chat: {condition: service_healthy}
      llama-embed: {condition: service_healthy}
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-bench-master}
    volumes:
      - ./conf/litellm.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    healthcheck:
      # litellm image has no curl; use its bundled python
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness',timeout=3).status==200 else 1)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  # ‚îÄ‚îÄ Pushgateway (receives ab_backend_active metric from run_ab.sh) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  pushgateway:
    image: prom/pushgateway:latest
    container_name: nqrag-pushgateway
    cpuset: ${PROM_CPUSET:-}
    ports:
      - "${PUSHGW_PORT:-9091}:9091"
    restart: unless-stopped

  # ‚îÄ‚îÄ Prometheus (scrapes LiteLLM + both llama servers) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  prometheus:
    image: ${PROM_IMAGE:-prom/prometheus:latest}
    container_name: nqrag-prometheus
    cpuset: ${PROM_CPUSET:-}
    depends_on:
      pushgateway: {condition: service_started}
    volumes:
      - ./conf/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    ports:
      - "${PROM_PORT:-9090}:9090"
    restart: unless-stopped

  # ‚îÄ‚îÄ Grafana (visualises the Prometheus metrics ‚Äî live RAG pipeline flow) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    container_name: nqrag-grafana
    cpuset: ${GRAFANA_CPUSET:-}
    depends_on:
      prometheus: {condition: service_started}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      # anonymous view so the link opens straight to the dashboard, no login
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: light
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/rag-flow.json
    volumes:
      - ./conf/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./conf/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped

  # ‚îÄ‚îÄ AnythingLLM (the RAG application) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  anythingllm:
    image: ${ALLM_IMAGE:-mintplexlabs/anythingllm:latest}
    container_name: nqrag-anythingllm
    cpuset: ${ALLM_CPUSET:-}
    depends_on:
      litellm: {condition: service_started}
    cap_add:
      - SYS_ADMIN
    environment:
      SERVER_PORT: 3001
      STORAGE_DIR: /app/server/storage
      VECTOR_DB: lancedb
      DISABLE_TELEMETRY: "true"
      # LLM via LiteLLM (Generic OpenAI provider)
      LLM_PROVIDER: generic-openai
      GENERIC_OPEN_AI_BASE_PATH: http://litellm:4000/v1
      GENERIC_OPEN_AI_API_KEY: ${LITELLM_MASTER_KEY:-sk-bench-master}
      # Which LiteLLM model AnythingLLM generates with. run_ab.sh swaps this to
      # `chat-model-bench` (ignore_eos + fixed n_predict) for fixed-decode A/B
      # runs so both backends emit an identical number of decode tokens.
      GENERIC_OPEN_AI_MODEL_PREF: ${CHAT_MODEL_NAME:-chat-model}
      GENERIC_OPEN_AI_MODEL_TOKEN_LIMIT: ${CHAT_CTX:-8192}
      # Embedder via LiteLLM (Generic OpenAI embedder)
      EMBEDDING_ENGINE: generic-openai
      EMBEDDING_BASE_PATH: http://litellm:4000/v1
      GENERIC_OPEN_AI_EMBEDDING_API_KEY: ${LITELLM_MASTER_KEY:-sk-bench-master}
      EMBEDDING_MODEL_PREF: embed-model
      # Binding CHARACTER cap on chunk size (AnythingLLM clamps chunks to this).
      # Decoupled from EMBED_CTX, which is a TOKEN context ‚Äî tying them silently
      # capped chunks at ~340 words. 8192 chars ~= EMBED_CTX(2048 tok) x 4.
      EMBEDDING_MODEL_MAX_CHUNK_LENGTH: ${EMBED_MAX_CHUNK_CHARS:-8192}
    volumes:
      - anythingllm-storage:/app/server/storage
    ports:
      - "${ALLM_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/api/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  # ‚îÄ‚îÄ Self-seeding init (configures AnythingLLM on `up`) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # One-shot: waits for anythingllm to be healthy (DB + tables created by then),
  # writes the API key + provider/chunk settings into its SQLite DB, then exits.
  # Makes a bare `docker compose up` fully self-configure ‚Äî no setup.sh needed.
  # Reuses the harness image (has python3 + stdlib sqlite3). Mounts the SAME named
  # volume anythingllm uses, and seeds the DB at ALLM_DB.
  seed:
    image: nqrag-harness:local
    build: ./harness
    container_name: nqrag-seed
    depends_on:
      anythingllm: {condition: service_healthy}
    environment:
      ALLM_DB: /allm-storage/anythingllm.db
      ALLM_KEY: ${ALLM_KEY:-nqrag-local-dev-key}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-bench-master}
      CHAT_CTX: ${CHAT_CTX:-8192}
      EMBED_CHUNK_WORDS: ${EMBED_CHUNK_WORDS:-512}
      EMBED_CHUNK_OVERLAP_WORDS: ${EMBED_CHUNK_OVERLAP_WORDS:-100}
      EMBED_MAX_CHUNK_CHARS: ${EMBED_MAX_CHUNK_CHARS:-8192}
    volumes:
      - anythingllm-storage:/allm-storage
      - ./scripts:/scripts:ro
    restart: "no"
    command: ["python3", "/scripts/seed_anythingllm.py"]

  # ‚îÄ‚îÄ Harness toolbox (ingest / evaluate / report) ‚Äî run on demand ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # Not started by `docker compose up` (profile gated). Invoke with:
  #   docker compose run --rm harness python ingest.py
  harness:
    build: ./harness
    image: nqrag-harness:local
    container_name: nqrag-harness
    cpuset: ${HARNESS_CPUSET:-}
    profiles: ["tools"]
    environment:
      ALLM_URL: http://anythingllm:3001
      LITELLM_URL: http://litellm:4000
      PROM_URL: http://prometheus:9090
      CHAT_METRICS_URL: http://llama-chat:8080/metrics
      EMBED_METRICS_URL: http://llama-embed:8080/metrics
      ALLM_KEY: ${ALLM_KEY:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-bench-master}
      SLUG: ${SLUG:-nq-bench}
      EVAL_DATASET: ${EVAL_DATASET:-nq_open}
      CORPUS_DATASET: ${CORPUS_DATASET:-BeIR/nq}
      DOC_N: ${DOC_N:-100}
      EVAL_N: ${EVAL_N:-100}
      CORPUS_SCAN: ${CORPUS_SCAN:-20000}
      QUERY_MODE: ${QUERY_MODE:-query}
      JUDGE_MODEL: ${JUDGE_MODEL:-chat-model}
      JUDGE_THRESHOLD: ${JUDGE_THRESHOLD:-0.5}
      JUDGE_BASE_URL: ${JUDGE_BASE_URL:-}
      JUDGE_API_KEY: ${JUDGE_API_KEY:-}
      WARMUP: ${WARMUP:-1}
      EVAL_LIMIT: ${EVAL_LIMIT:-}
      RETRIEVAL_TOPN: ${RETRIEVAL_TOPN:-5}
      RETRIEVAL_SIM_THRESHOLD: ${RETRIEVAL_SIM_THRESHOLD:-0.0}
      DATA_DIR: /data
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /data/hf-cache
      # ‚îÄ‚îÄ bulk ingest (write vectors straight into AnythingLLM's LanceDB) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # BULK_INGEST=1 bypasses the per-doc HTTP upload path: the harness embeds
      # chunks against llama-embed and writes rows directly into the workspace's
      # LanceDB table (mounted via anythingllm-storage). 0 = legacy HTTP API path.
      BULK_INGEST: ${BULK_INGEST:-1}
      ALLM_STORAGE: /allm-storage
      EMBED_URL: ${EMBED_URL:-http://llama-embed:8080/v1}
      EMBED_MODEL_NAME: ${EMBED_MODEL_NAME:-embed-model}
      EMBED_REQ_BATCH: ${EMBED_REQ_BATCH:-64}
      EMBED_CONCURRENCY: ${EMBED_CONCURRENCY:-8}
      EMBED_CHUNK_WORDS: ${EMBED_CHUNK_WORDS:-512}
      EMBED_CHUNK_OVERLAP_WORDS: ${EMBED_CHUNK_OVERLAP_WORDS:-100}
      EMBED_MAX_CHUNK_CHARS: ${EMBED_MAX_CHUNK_CHARS:-8192}
    volumes:
      - ./src:/app:ro
      - ./data:/data
      # Write access to AnythingLLM's storage so bulk ingest can create the
      # LanceDB table directly (table name = workspace slug).
      - anythingllm-storage:/allm-storage
    working_dir: /app

volumes:
  anythingllm-storage:
  prom-data:
  grafana-data:
