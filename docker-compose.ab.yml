# ZenDNN A/B overlay. Used by run_ab.sh as:
#   docker compose -f docker-compose.yml -f docker-compose.ab.yml ...
#
# It reconfigures `llama-chat` to run a host-built llama-server binary (mounted
# from a build tree) inside the same runtime image, so a baseline build and a
# ZenDNN build can be swapped per job while everything else stays identical.
# The base stack (embed/litellm/prometheus/anythingllm/harness) is unchanged.
services:
  llama-chat:
    image: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}   # runtime only
    # CPU pinning via Docker cpuset — same as the base service.
    cpuset: ${CHAT_CPUSET:-}
    environment:
      ZENDNNL_MATMUL_ALGO: ${ZENDNNL_MATMUL_ALGO:-}
      AB_JOB: ${AB_JOB:-}
      CHAT_CTX: ${CHAT_CTX:-8192}
      CHAT_NGL: ${CHAT_NGL:-0}
      CHAT_PARALLEL: ${CHAT_PARALLEL:-1}
      CHAT_THREADS: ${CHAT_THREADS:-}
      CHAT_MODEL_PATH: ${CHAT_MODEL_PATH:-}
      CHAT_EXTRA_FLAGS: ${CHAT_EXTRA_FLAGS:-}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        export LD_LIBRARY_PATH=/opt/llama/bin:/opt/llama/lib:$$LD_LIBRARY_PATH
        export OMP_PROC_BIND=close
        export OMP_PLACES=cores
        [ -z "$$ZENDNNL_MATMUL_ALGO" ] && unset ZENDNNL_MATMUL_ALGO
        ARGS="--host 0.0.0.0 --port 8080 --ctx-size $$CHAT_CTX --n-gpu-layers $$CHAT_NGL --parallel $$CHAT_PARALLEL --no-mmap -fa on --metrics --alias chat-model --model $$CHAT_MODEL_PATH"
        if [ -n "$$CHAT_THREADS" ]; then ARGS="$$ARGS --threads $$CHAT_THREADS"; fi
        ARGS="$$ARGS $$CHAT_EXTRA_FLAGS"
        echo "[llama-chat AB job=$${AB_JOB:-?} algo=$${ZENDNNL_MATMUL_ALGO:-unset}] /opt/llama/bin/llama-server $$ARGS"
        exec /opt/llama/bin/llama-server $$ARGS
    volumes:
      - ${CHAT_BINDIR:?set CHAT_BINDIR (host llama-server build/bin dir)}:/opt/llama/bin:ro
      - ${CHAT_LIBDIR:-${CHAT_BINDIR}}:/opt/llama/lib:ro
