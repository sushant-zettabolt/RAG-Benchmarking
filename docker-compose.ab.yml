# ZenDNN A/B overlay. Used by run_ab.sh as:
#   docker compose -f docker-compose.yml -f docker-compose.ab.yml ...
#
# The A/B compares the WHOLE inference path under each backend, so it swaps BOTH
# the chat and the embed server together per job by overriding their images
# (built from source by `make build-llama`):
#   baseline job: CHAT_IMAGE=EMBED_IMAGE=nqrag-llama:baseline  (ggml, no ZenDNN)
#   zendnn  job:  CHAT_IMAGE=EMBED_IMAGE=nqrag-llama:zendnn     (ggml + ZenDNN)
# No host-built binaries are mounted anymore — the backend IS the image. The
# zendnn job also sets ZENDNNL_MATMUL_ALGO on both services. Everything else
# (litellm/prometheus/anythingllm/harness) is unchanged.
services:
  llama-chat:
    image: ${CHAT_IMAGE:-nqrag-llama:zendnn}
    cpuset: ${CHAT_CPUSET:-}
    environment:
      ZENDNNL_MATMUL_ALGO: ${ZENDNNL_MATMUL_ALGO:-}
      AB_JOB: ${AB_JOB:-}

  llama-embed:
    image: ${EMBED_IMAGE:-nqrag-llama:zendnn}
    cpuset: ${EMBED_CPUSET:-}
    environment:
      ZENDNNL_MATMUL_ALGO: ${ZENDNNL_MATMUL_ALGO:-}
      AB_JOB: ${AB_JOB:-}
