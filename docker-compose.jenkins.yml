# Jenkins CI controller for the ZenDNN regression watch. Kept in its OWN compose
# project (nqrag-ci) so it is independent of the benchmark stack — bring it up
# once and leave it running; it drives the benchmark stack on a schedule.
#
#   docker compose -p nqrag-ci -f docker-compose.jenkins.yml up -d --build   # or: make jenkins-up
#   open http://localhost:${JENKINS_PORT:-8088}   (admin / admin by default)
#
# NOTE: the `-p nqrag-ci` is REQUIRED. The `name:` below is overridden by
# COMPOSE_PROJECT_NAME in .env, so without -p Jenkins would land in the benchmark
# stack's project. `make jenkins-{up,down,logs}` already pass it.
#
# Docker-out-of-Docker: the host's docker.sock is mounted in, and the project is
# bind-mounted at the SAME absolute path it has on the host (PROJECT_DIR). That
# identical path is essential — when a pipeline step runs `docker compose`, the
# bind-mount source paths it hands the daemon are host paths, so the in-container
# path must equal the host path or the benchmark containers would mount nothing.
name: nqrag-ci

services:
  jenkins:
    build:
      context: ./docker/jenkins
      dockerfile: Dockerfile
    image: nqrag-jenkins:local
    container_name: nqrag-jenkins
    # root so it can use the host docker.sock and the project tree (owned by the
    # host user); run_ci.sh chowns CI artifacts back to HOST_UID:HOST_GID.
    user: root
    # HOST networking is REQUIRED: the pipeline runs run_ab.sh, whose health
    # checks / warmups / eval curls hit the benchmark servers at localhost:<PORT>
    # (their host-published ports). Inside a bridged container, localhost is the
    # Jenkins container itself and those checks would hang forever. Sharing the
    # host net namespace makes localhost:<PORT> resolve to the published ports.
    network_mode: host
    cpuset: ${JENKINS_CPUSET:-}
    environment:
      # With host networking the `ports:` mapping is ignored, so tell Jenkins to
      # listen directly on JENKINS_PORT (default 8088).
      JENKINS_OPTS: "--httpPort=${JENKINS_PORT:-8088}"
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}
      JENKINS_URL: ${JENKINS_URL:-http://localhost:8088/}
      CASC_JENKINS_CONFIG: /var/jenkins_conf/casc.yaml
      # Passed into the pipeline so it cd's into the project at the host path.
      PROJECT_DIR: ${PROJECT_DIR:-/home/zettabolt/mkumar/sushant/RAG_testing/rag_pipeline_bench}
      HOST_UID: ${HOST_UID:-1002}
      HOST_GID: ${HOST_GID:-1002}
      # Single artifact+history root. The pipeline reads/writes ONLY here, and the
      # Publish stage reads the verdict + archives from it — so repointing this var
      # makes the Jenkins UI reflect a different history. Bind-mounted below.
      CI_ARTIFACT_DIR: ${CI_ARTIFACT_DIR:-${PROJECT_DIR:-/home/zettabolt/mkumar/sushant/RAG_testing/rag_pipeline_bench}/ci}
      # Models swept by the CI (run_ci.sh enumerates + dereferences these).
      CHAT_MODELS_DIR: ${CHAT_MODELS_DIR:?set CHAT_MODELS_DIR in .env to the dir of chat GGUFs to sweep}
      MODELS_DIR: ${MODELS_DIR:?set MODELS_DIR in .env}
    volumes:
      # JENKINS_HOME — ALL persistent controller state (build history shown in the
      # UI, console logs, archived artifacts, build-number counter, job config)
      # lives in a `jenkins_home` subdir of the mounted artifact dir, NOT in a
      # docker-managed volume. This is what makes the artifact dir the single
      # source of truth: repoint CI_ARTIFACT_DIR (dir1 -> dir2), restart, and
      # Jenkins boots a FRESH home from dir2 — dir1's builds/history vanish from
      # the UI and are never used for comparison. JCasC (mounted read-only below)
      # re-creates the job on every boot, so a fresh home still comes up fully
      # configured. Nothing controller-side is kept inside the container.
      - ${CI_ARTIFACT_DIR:-${PROJECT_DIR:-/home/zettabolt/mkumar/sushant/RAG_testing/rag_pipeline_bench}/ci}/jenkins_home:/var/jenkins_home
      - ./docker/jenkins/casc.yaml:/var/jenkins_conf/casc.yaml:ro
      - ./docker/jenkins/seed_job.groovy:/var/jenkins_conf/seed_job.groovy:ro
      - /var/run/docker.sock:/var/run/docker.sock
      # Project bind-mounted at the SAME absolute path as on the host (see header).
      - ${PROJECT_DIR:-/home/zettabolt/mkumar/sushant/RAG_testing/rag_pipeline_bench}:${PROJECT_DIR:-/home/zettabolt/mkumar/sushant/RAG_testing/rag_pipeline_bench}
      # Artifact+history root, bind-mounted at its identical absolute path so the
      # pipeline writes there and the host keeps everything (the "consult this dir
      # only for history" requirement). Default is the in-repo ci/ tree.
      - ${CI_ARTIFACT_DIR:-${PROJECT_DIR:-/home/zettabolt/mkumar/sushant/RAG_testing/rag_pipeline_bench}/ci}:${CI_ARTIFACT_DIR:-${PROJECT_DIR:-/home/zettabolt/mkumar/sushant/RAG_testing/rag_pipeline_bench}/ci}
      # Model dirs, identical-path read-only, so run_ci.sh can list CHAT_MODELS_DIR
      # and readlink -f each GGUF to its real target under MODELS_DIR.
      - ${CHAT_MODELS_DIR:?set CHAT_MODELS_DIR in .env}:${CHAT_MODELS_DIR}:ro
      - ${MODELS_DIR:?set MODELS_DIR in .env}:${MODELS_DIR}:ro
    # No `ports:` — host networking publishes JENKINS_OPTS --httpPort directly on
    # the host. Jenkins UI: http://localhost:${JENKINS_PORT:-8088}
    restart: unless-stopped

# No named volumes: every persistent path (Jenkins home + CI runs/history) is a
# bind-mount under CI_ARTIFACT_DIR, so the mounted dir holds 100% of the state.
